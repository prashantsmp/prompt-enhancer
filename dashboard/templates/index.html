<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptEnhancer | Multi-Agent T2I Dashboard</title>
    <!-- Google Fonts Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0d19;
            --card-bg: rgba(20, 24, 46, 0.45);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-glow: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 60%);
            --accent-glow-secondary: radial-gradient(circle at 10% 10%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            
            /* Status Colors */
            --color-pending: #3b82f6;
            --color-completed: #10b981;
            --color-quarantine: #ef4444;
            --color-running: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(99, 102, 241, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(236, 72, 153, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.05) 0%, transparent 70%);
            background-attachment: fixed;
        }

        h1, h2, h3, h4, .brand-logo {
            font-family: 'Outfit', sans-serif;
        }

        /* Container Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand-logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #a5b4fc 0%, #ec4899 50%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .status-badge-global {
            background: rgba(99, 102, 241, 0.15);
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.3);
            backdrop-filter: blur(4px);
        }

        /* Main Workspace Grid */
        .workspace {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 30px;
        }

        /* Glassmorphic Panel Card */
        .glass-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            transition: all 0.3s ease;
        }

        .input-panel {
            height: fit-content;
            position: sticky;
            top: 40px;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Input Controls */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(10, 12, 22, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea:focus {
            border-color: rgba(99, 102, 241, 0.8);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.15);
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Session Cards Area */
        .sessions-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .sessions-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .session-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .session-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        .session-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .session-id {
            font-size: 13px;
            color: var(--text-secondary);
            font-family: monospace;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .status-badge {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-pending {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .status-pending::before { background-color: var(--color-pending); }

        .status-completed {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .status-completed::before { background-color: var(--color-completed); }

        .status-quarantined {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .status-quarantined::before { background-color: var(--color-quarantine); }

        .status-security {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.4);
            animation: pulse-red 2s infinite;
        }
        .status-security::before { background-color: var(--color-quarantine); }

        .status-running {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .status-running::before { background-color: var(--color-running); }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .raw-prompt-display {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.5;
            color: #ffffff;
        }

        /* Vibe Diff Layout */
        .vibe-diff-box {
            background: rgba(10, 12, 22, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 18px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 10px;
        }

        .diff-column {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .diff-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .diff-content {
            font-size: 13px;
            line-height: 1.5;
            color: #e5e7eb;
        }

        /* Action Buttons */
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-approve {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .btn-approve:hover {
            background: rgba(16, 185, 129, 0.35);
        }

        .btn-reject {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-reject:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Rendered Output Image */
        .image-output-container {
            width: 100%;
            height: 320px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-output-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-score {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(10, 12, 22, 0.85);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.4);
            backdrop-filter: blur(4px);
        }

        /* Sliding Side Panel Drawer */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .drawer-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer {
            position: fixed;
            top: 0;
            right: -600px;
            width: 600px;
            height: 100%;
            background: #0f1224;
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1001;
            padding: 40px;
            overflow-y: auto;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .drawer.open {
            right: 0;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .drawer-close {
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            background: none;
            border: none;
        }

        .drawer-close:hover {
            color: #ffffff;
        }

        .drawer-section {
            margin-bottom: 30px;
        }

        .drawer-section h4 {
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .log-box {
            background: rgba(10, 12, 22, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #e5e7eb;
            overflow-x: auto;
            max-height: 300px;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border-left-color: #6366f1;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-left: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand-logo">PROMPT ENHANCER</div>
        <div class="status-badge-global">Agentic Loop Active</div>
    </header>

    <div class="workspace">
        <!-- Input Side Panel -->
        <div class="glass-panel input-panel">
            <div class="panel-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                Enhance New Prompt
            </div>
            
            <div class="form-group">
                <label for="promptInput">Concise Prompt</label>
                <textarea id="promptInput" placeholder="Describe your image in a few words... e.g. 'A huge turtle carrying a small city'"></textarea>
            </div>
            
            <button class="btn" id="submitBtn">
                <span>Generate Enriched Prompt</span>
            </button>
            
            <div id="submitStatus" style="margin-top: 15px; display: none;">
                <div class="spinner"></div>
                <span class="loading-text" id="statusMessage">Starting agent session...</span>
            </div>
        </div>

        <!-- Sessions List Content -->
        <div>
            <div class="sessions-list-header">
                <h2>Active Runs & Approvals</h2>
                <button class="btn-sm btn-secondary" id="refreshBtn">Refresh</button>
            </div>

            <div class="sessions-grid" id="sessionsGrid">
                <div class="no-data">Loading session runs...</div>
            </div>
        </div>
    </div>
</div>

<!-- Sliding Side Panel Drawer -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="sessionDrawer">
    <div class="drawer-header">
        <h3 id="drawerSessionId">Session Details</h3>
        <button class="drawer-close" id="drawerClose">&times;</button>
    </div>
    
    <div class="drawer-section">
        <h4>Reasoning Path (Chain-of-Thought)</h4>
        <div class="log-box" id="drawerCot" style="font-family: inherit; font-size: 14px;"></div>
    </div>

    <div class="drawer-section">
        <h4>Security Check Point</h4>
        <div class="log-box" id="drawerSecurity" style="font-family: inherit; font-size: 14px;"></div>
    </div>

    <div class="drawer-section">
        <h4>AlignEvaluator Rubric Feedback</h4>
        <div class="log-box" id="drawerEvaluator" style="font-family: inherit; font-size: 14px;"></div>
    </div>
</div>

<script>
    const sessionsGrid = document.getElementById("sessionsGrid");
    const promptInput = document.getElementById("promptInput");
    const submitBtn = document.getElementById("submitBtn");
    const submitStatus = document.getElementById("submitStatus");
    const statusMessage = document.getElementById("statusMessage");
    const refreshBtn = document.getElementById("refreshBtn");
    
    const drawerOverlay = document.getElementById("drawerOverlay");
    const sessionDrawer = document.getElementById("sessionDrawer");
    const drawerClose = document.getElementById("drawerClose");
    
    // In-memory cache of session objects
    let sessionCache = {};

    async function loadSessions() {
        try {
            const resp = await fetch("/api/sessions");
            const data = await resp.json();
            
            if (data.length === 0) {
                sessionsGrid.innerHTML = '<div class="no-data">No active agent runs found. Submit a prompt to start.</div>';
                return;
            }
            
            sessionsGrid.innerHTML = "";
            data.forEach(session => {
                sessionCache[session.session_id] = session;
                sessionsGrid.appendChild(createSessionCard(session));
            });
        } catch (e) {
            sessionsGrid.innerHTML = '<div class="no-data">Failed to load agent sessions. Make sure the ADK backend is running.</div>';
        }
    }

    function createSessionCard(session) {
        const card = document.createElement("div");
        card.className = "session-card";
        
        let statusClass = `status-${session.status}`;
        if (session.status === "security_block") statusClass = "status-security";
        
        // Render Redaction Badges
        let redactedBadges = "";
        if (session.redacted_categories && session.redacted_categories.length > 0) {
            redactedBadges = `<div style="margin-top: 8px; display: flex; gap: 6px;">` + 
                session.redacted_categories.map(c => `<span style="font-size: 10px; font-weight:700; background:rgba(239,68,68,0.2); color:#f87171; border: 1px solid rgba(239,68,68,0.4); padding: 2px 6px; border-radius: 4px;">REDACTED: ${c}</span>`).join("") + 
                `</div>`;
        }

        // Render Vibe Diff section if pending approval
        let vibeDiffHtml = "";
        if (session.status === "pending_approval") {
            vibeDiffHtml = `
                <div class="vibe-diff-box">
                    <div class="diff-column">
                        <div class="diff-title">Original Concise Prompt</div>
                        <div class="diff-content">${session.raw_prompt}</div>
                    </div>
                    <div class="diff-column">
                        <div class="diff-title">Enriched Reprompt</div>
                        <div class="diff-content">${session.enriched_prompt}</div>
                    </div>
                </div>
                <div class="action-bar" id="actions-${session.session_id}">
                    <button class="btn-sm btn-reject" onclick="handleAction('${session.session_id}', 'reject')">Reject</button>
                    <button class="btn-sm btn-approve" onclick="handleAction('${session.session_id}', 'approve')">Approve & Render</button>
                </div>
            `;
        }

        // Render output image section if completed
        let outputHtml = "";
        if (session.status === "completed" && session.image_url) {
            outputHtml = `
                <div class="image-output-container">
                    <img src="${session.image_url}" alt="Generated Image Output" />
                    <div class="image-score">Alignment: ${session.alignment_score}/5</div>
                </div>
            `;
        }

        // Card Content assembly
        card.innerHTML = `
            <div class="session-card-header">
                <div>
                    <span class="session-id">Session ID: ${session.session_id}</span>
                    <span style="font-size: 12px; color: var(--text-secondary); margin-left: 10px;">Iterations: ${session.iterations}</span>
                    ${redactedBadges}
                </div>
                <span class="status-badge ${statusClass}">${session.status.replace("_", " ")}</span>
            </div>
            
            <div class="raw-prompt-display">
                <span style="color: var(--text-secondary); font-size: 13px; font-weight: 400; display:block; margin-bottom: 4px;">Target Prompt:</span>
                "${session.raw_prompt || '(Empty Prompt)'}"
            </div>
            
            ${vibeDiffHtml}
            ${outputHtml}
            
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 10px;">
                <button class="btn-sm btn-secondary" onclick="openDrawer('${session.session_id}')">View Details & Logs</button>
                <span style="font-size:12px; color: var(--text-secondary);">
                    ${new Date(session.last_update * 1000).toLocaleTimeString()}
                </span>
            </div>
        `;
        
        return card;
    }

    async function handleAction(sessionId, action) {
        const actionContainer = document.getElementById(`actions-${sessionId}`);
        actionContainer.innerHTML = `<div class="spinner"></div><span class="loading-text" style="font-size: 13px;">Resuming execution loop...</span>`;
        
        try {
            const resp = await fetch(`/api/${action}/${sessionId}`, { method: "POST" });
            if (resp.ok) {
                setTimeout(loadSessions, 1500); // Reload sessions after pause
            } else {
                alert(`Action failed: ${await resp.text()}`);
                loadSessions();
            }
        } catch (e) {
            alert(`Action failed: ${e}`);
            loadSessions();
        }
    }

    function openDrawer(sessionId) {
        const session = sessionCache[sessionId];
        if (!session) return;
        
        document.getElementById("drawerSessionId").innerText = `Run Details: ${sessionId}`;
        
        // CoT reasoning display
        const drawerCot = document.getElementById("drawerCot");
        drawerCot.innerText = session.cot_reasoning || "No CoT reasoning has been generated yet for this session.";
        
        // Security checks display
        const drawerSecurity = document.getElementById("drawerSecurity");
        let securityInfo = "✓ Input scrub completed.\n✓ No PII detected.\n✓ Prompt Injection checks passed.";
        if (session.redacted_categories && session.redacted_categories.length > 0) {
            securityInfo = `⚠ PII detected and redacted!\nRedacted Categories: ${session.redacted_categories.join(", ")}`;
        }
        if (session.status === "security_block" || session.status === "quarantined") {
            securityInfo = `❌ SECURITY VIOLATION GATED!\nSession quarantined.\nDetails: High risk prompt execution intercepted.`;
        }
        drawerSecurity.innerText = securityInfo;
        
        // Evaluator Rubric checks
        const drawerEvaluator = document.getElementById("drawerEvaluator");
        drawerEvaluator.innerText = session.eval_rationale || "No evaluation results available yet.";
        
        // Open
        drawerOverlay.classList.add("open");
        sessionDrawer.classList.add("open");
    }

    function closeDrawer() {
        drawerOverlay.classList.remove("open");
        sessionDrawer.classList.remove("open");
    }

    // Submit new concise prompt
    submitBtn.addEventListener("click", async () => {
        const prompt = promptInput.value.trim();
        if (!prompt) return;
        
        submitBtn.disabled = true;
        submitStatus.style.display = "block";
        statusMessage.innerText = "Initializing agent loop...";
        
        try {
            const resp = await fetch("/api/create", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt })
            });
            
            if (resp.ok) {
                statusMessage.innerText = "Enhancement complete! Pending approval.";
                promptInput.value = "";
                setTimeout(() => {
                    submitStatus.style.display = "none";
                    submitBtn.disabled = false;
                    loadSessions();
                }, 1000);
            } else {
                statusMessage.innerText = `Error: ${await resp.text()}`;
                submitBtn.disabled = false;
            }
        } catch (e) {
            statusMessage.innerText = `Network Error: ${e}`;
            submitBtn.disabled = false;
        }
    });

    refreshBtn.addEventListener("click", loadSessions);
    drawerClose.addEventListener("click", closeDrawer);
    drawerOverlay.addEventListener("click", closeDrawer);
    
    // Initial Load & Poll
    loadSessions();
    setInterval(loadSessions, 5000); // Auto refresh every 5 seconds
</script>
</body>
</html>
