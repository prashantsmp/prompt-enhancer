# deployment.yaml
# Cloud Run Service YAML Specifications for Knative Serving deployment

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: prompt-enhancer-agent
  labels:
    cloud.googleapis.com/location: us-east1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containers:
        - image: us-east1-docker.pkg.dev/GOOGLE_CLOUD_PROJECT_PLACEHOLDER/prompt-enhancer-repo/agent:latest
          resources:
            limits:
              memory: 4Gi
              cpu: "1"
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: "GOOGLE_CLOUD_PROJECT_PLACEHOLDER"
            - name: GOOGLE_CLOUD_LOCATION
              value: "global"
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "True"
---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: prompt-enhancer-dashboard
  labels:
    cloud.googleapis.com/location: us-east1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "2"
    spec:
      containers:
        - image: us-east1-docker.pkg.dev/GOOGLE_CLOUD_PROJECT_PLACEHOLDER/prompt-enhancer-repo/dashboard:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 1Gi
              cpu: "1"
          env:
            - name: AGENT_SERVICE_URL
              value: "https://prompt-enhancer-agent-url-placeholder.run.app"
            - name: APP_NAME
              value: "app"
            - name: USER_ID
              value: "default-user"
